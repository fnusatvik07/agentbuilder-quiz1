<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Marksheet · DataSense Agent Builder 2026 Quiz 1</title>
<link rel="stylesheet" href="/static/style.css">
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>

<div class="page" style="max-width: 920px;">
    <div class="brand-mark">DataSense</div>
    <div class="brand-course">Agent Builder 2026</div>
    <div class="brand-quiz">Quiz 1 · Tool Calling and ReAct Loop</div>

    <h1 id="title" style="margin-top: 18px;">Marksheet</h1>
    <div class="subtitle" id="subtitle">Loading...</div>

    <div id="badge-row"></div>

    <div class="scorecard" id="scorecard" style="display:none">
        <div class="stat"><div class="label">Score</div><div class="value" id="s-score"></div></div>
        <div class="stat"><div class="label">Time taken</div><div class="value" id="s-time"></div></div>
        <div class="stat"><div class="label">Rank</div><div class="value" id="s-rank"></div></div>
        <div class="stat"><div class="label">Percentile</div><div class="value" id="s-pct"></div></div>
    </div>

    <div id="tier-wrap"></div>
    <div id="class-wrap"></div>

    <div class="action-row">
        <a href="/leaderboard"><button>View leaderboard</button></a>
        <button id="btn-print">Print or save as PDF</button>
        <button id="btn-share">Copy link to this marksheet</button>
        <a href="/"><button>Back to home</button></a>
    </div>

    <div class="mini-lb" id="mini-lb">
        <h3>
            <span class="live-pill">Live</span>
            Class leaderboard so far
            <span class="last-updated" id="mini-lb-updated"></span>
        </h3>
        <div id="mini-lb-table"><div class="empty-state">Loading...</div></div>
    </div>

    <h2>Question-wise breakdown</h2>

    <div class="filter-bar">
        <span class="filter-label">Show:</span>
        <button class="active" data-filter="all" id="f-all">All</button>
        <button data-filter="wrong" id="f-wrong">Wrong only</button>
        <button data-filter="right" id="f-right">Correct only</button>
        <span class="spacer"></span>
        <span id="filter-count" style="color:#666; font-size:12px;"></span>
    </div>

    <div id="breakdown"></div>
</div>

<div class="share-toast" id="toast">Link copied to clipboard</div>

<script>
function fmtTime(sec) {
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return `${m}m ${String(s).padStart(2,"0")}s`;
}

function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
        "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
    }[c]));
}

function pctFillClass(pct) {
    if (pct < 40) return "low";
    if (pct < 70) return "mid";
    return "";
}

let allResults = [];
let myName = null;

(async function load() {
    const path = window.location.pathname.split("/").filter(Boolean);
    const attemptId = path[path.length - 1];

    const res = await fetch(`/api/result/${attemptId}`);
    if (!res.ok) {
        document.getElementById("subtitle").textContent = "Could not load result.";
        return;
    }
    const r = await res.json();

    myName = r.name;
    document.getElementById("title").textContent = `Marksheet: ${r.name}`;
    const submittedAt = new Date(r.submitted_at * 1000).toLocaleString();
    document.getElementById("subtitle").textContent =
        `Submitted ${submittedAt}  ·  ${r.total_attempts} candidate${r.total_attempts === 1 ? "" : "s"} so far`;

    // Achievement badge
    if (r.badge) {
        const div = document.createElement("div");
        div.className = `badge ${r.badge.tier}`;
        div.textContent = r.badge.label;
        document.getElementById("badge-row").appendChild(div);
    }

    // Scorecard
    document.getElementById("scorecard").style.display = "grid";
    document.getElementById("s-score").textContent = `${r.score} / ${r.total}`;
    document.getElementById("s-time").textContent = fmtTime(r.time_sec);
    document.getElementById("s-rank").textContent = `#${r.rank}`;
    document.getElementById("s-pct").textContent = (r.percentile == null) ? "..." : `${r.percentile}%`;

    // Tier breakdown
    if (r.tier_breakdown && r.tier_breakdown.length) {
        const tierLabels = {1: "1-mark questions (basics)",
                            2: "2-mark questions (analysis)",
                            3: "3-mark questions (production)"};
        let html = `<div class="tier-section">
            <h3>Performance by tier</h3>`;
        for (const t of r.tier_breakdown) {
            const pct = (t.points_possible > 0)
                ? Math.round(100 * t.points_earned / t.points_possible) : 0;
            const fill = pctFillClass(pct);
            html += `
                <div class="tier-row">
                    <div class="tier-label">${tierLabels[t.marks] || (t.marks+"-mark")}</div>
                    <div class="tier-bar"><div class="tier-fill ${fill}" style="width:${pct}%"></div></div>
                    <div class="tier-stat">${t.points_earned}/${t.points_possible} pts (${t.correct}/${t.total_questions})</div>
                </div>`;
        }
        html += "</div>";
        document.getElementById("tier-wrap").innerHTML = html;
    }

    // Class context
    if (r.class_context) {
        const c = r.class_context;
        const scoreDelta = r.score - c.avg_score;
        const timeDelta = r.time_sec - c.median_time_sec;
        const scoreDeltaCls = scoreDelta >= 0 ? "positive" : "negative";
        const timeDeltaCls = timeDelta <= 0 ? "positive" : "negative";  // faster = positive
        const scoreSign = scoreDelta >= 0 ? "+" : "";
        const timeSign = timeDelta >= 0 ? "+" : "";
        document.getElementById("class-wrap").innerHTML = `
            <div class="class-context">
                <h3>Class context (${c.n} candidates so far)</h3>
                <div class="ctx-row">
                    <span>Class average score</span>
                    <span><b>${c.avg_score} / ${r.total}</b> &nbsp;·&nbsp; you: <b>${r.score}</b>
                          <span class="delta ${scoreDeltaCls}">(${scoreSign}${scoreDelta.toFixed(1)})</span>
                    </span>
                </div>
                <div class="ctx-row">
                    <span>Class median time</span>
                    <span><b>${fmtTime(c.median_time_sec)}</b> &nbsp;·&nbsp; you: <b>${fmtTime(r.time_sec)}</b>
                          <span class="delta ${timeDeltaCls}">(${timeSign}${Math.round(timeDelta)}s)</span>
                    </span>
                </div>
            </div>
        `;
    }

    // Question breakdown
    allResults = r.breakdown;
    renderBreakdown("all");

    // Wire actions
    document.getElementById("btn-print").addEventListener("click", () => window.print());
    document.getElementById("btn-share").addEventListener("click", async () => {
        const url = window.location.href;
        try {
            await navigator.clipboard.writeText(url);
            const t = document.getElementById("toast");
            t.classList.add("show");
            setTimeout(() => t.classList.remove("show"), 1800);
        } catch (e) {
            prompt("Copy this URL:", url);
        }
    });

    // Filter buttons
    document.querySelectorAll(".filter-bar button[data-filter]").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".filter-bar button[data-filter]")
                .forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            renderBreakdown(btn.dataset.filter);
        });
    });

    // Start polling the mini live leaderboard
    refreshMiniLb();
    setInterval(refreshMiniLb, 5000);
})();

async function refreshMiniLb() {
    try {
        const res = await fetch("/api/leaderboard");
        if (!res.ok) return;
        const rows = await res.json();
        document.getElementById("mini-lb-updated").textContent =
            "updated " + new Date().toLocaleTimeString();
        const wrap = document.getElementById("mini-lb-table");

        if (!rows.length) {
            wrap.innerHTML = '<div class="empty-state">No submissions yet.</div>';
            return;
        }

        const TOP_N = 10;
        const top = rows.slice(0, TOP_N);
        const myRow = rows.find(r => r.name === myName);
        const myInTop = top.some(r => r.name === myName);

        let html = `<table>
            <thead>
              <tr>
                <th class="rank-cell">#</th>
                <th>Name</th>
                <th class="score-cell">Score</th>
                <th class="time-cell">Time</th>
              </tr>
            </thead>
            <tbody>`;
        for (const r of top) {
            const me = (r.name === myName) ? ' class="you"' : '';
            const tag = (r.name === myName) ? ' (you)' : '';
            html += `<tr${me}>
                <td class="rank-cell">${r.rank}</td>
                <td>${escapeHtml(r.name)}${tag}</td>
                <td class="score-cell">${r.score}/${r.total}</td>
                <td class="time-cell">${fmtTime(r.time_sec)}</td>
            </tr>`;
        }
        if (!myInTop && myRow) {
            html += `<tr class="ellipsis-row"><td colspan="4">...</td></tr>`;
            html += `<tr class="you">
                <td class="rank-cell">${myRow.rank}</td>
                <td>${escapeHtml(myRow.name)} (you)</td>
                <td class="score-cell">${myRow.score}/${myRow.total}</td>
                <td class="time-cell">${fmtTime(myRow.time_sec)}</td>
            </tr>`;
        }
        html += "</tbody></table>";
        wrap.innerHTML = html;
    } catch (e) { /* silent */ }
}

function renderBreakdown(mode) {
    const out = document.getElementById("breakdown");
    out.innerHTML = "";

    let visible = 0;
    for (const b of allResults) {
        const status = (b.chosen == null) ? "skipped" :
                       (b.chosen === b.correct ? "correct" : "wrong");
        const matches = (mode === "all") ||
                        (mode === "wrong" && (status === "wrong" || status === "skipped")) ||
                        (mode === "right" && status === "correct");
        if (!matches) continue;
        visible++;

        const verdict = (status === "skipped") ? "Skipped" :
                        (status === "correct" ? `+${b.awarded} mark${b.awarded > 1 ? "s" : ""}` : "Wrong (0)");

        const optsHtml = b.options.map(o => {
            let cls = "opt";
            if (o.key === b.correct) cls += " correct";
            if (b.chosen === o.key && o.key !== b.correct) cls += " chosen-wrong";
            const tag = o.key === b.correct ? " ✓ correct"
                      : (b.chosen === o.key ? " ✗ your answer" : "");
            return `<div class="${cls}"><b>${o.key}.</b> ${o.html}${tag ? ` <i style="color:#666; font-size:12px;">${tag}</i>` : ""}</div>`;
        }).join("");

        const div = document.createElement("div");
        div.className = `qresult ${status}`;
        div.innerHTML = `
            <div class="qhead">
                <div class="label">Q${b.id}  ·  ${b.marks} mark${b.marks > 1 ? "s" : ""}</div>
                <div class="verdict">${verdict}</div>
            </div>
            <div class="stem">${b.stem_html}</div>
            <div class="options-static">${optsHtml}</div>
            <div class="explanation"><span class="label">Why:</span>${b.explanation}</div>
        `;
        out.appendChild(div);
    }

    document.getElementById("filter-count").textContent =
        `Showing ${visible} of ${allResults.length}`;
}
</script>

</body>
</html>
